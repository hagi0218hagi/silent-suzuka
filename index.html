<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Suzuka - The Fastest Legend</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        green: {
                            primary: '#2d5a27',
                            hover: '#3d7a35',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white dark:bg-stone-900 text-gray-800 dark:text-gray-100">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-white/90 dark:bg-stone-900/90 backdrop-blur-md shadow-sm border-b border-gray-100 dark:border-stone-800">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black italic tracking-tighter text-green-primary dark:text-green-400">SILENT SUZUKA</a>
            
            <div class="hidden md:flex items-center space-x-6 font-bold text-gray-500 dark:text-gray-400">
                <a href="index.html" class="nav-link active hover:text-green-primary transition">HOME</a>
                <a href="history.html" class="nav-link hover:text-green-primary transition">HISTORY</a>
                <a href="scenes.html" class="nav-link hover:text-green-primary transition">SCENES</a>
                <a href="memoirs.html" class="nav-link hover:text-green-primary transition">MEMOIRS</a>
                <a href="board.html" class="nav-link hover:text-green-primary transition">BOARD</a>
                <a href="memorial.html" class="nav-link hover:text-green-primary transition">MEMORIAL</a>
                <a href="goods.html" class="nav-link hover:text-green-primary transition">GOODS</a>
                
                <!-- Search Bar -->
                <div class="relative ml-4">
                    <input type="text" id="searchInput" placeholder="検索..." 
                           class="bg-gray-100 dark:bg-stone-800 text-sm px-4 py-2 rounded-full border-none focus:ring-2 focus:ring-green-primary outline-none text-gray-800 dark:text-white">
                    <div id="searchResults" class="absolute top-12 right-0 w-64 bg-white dark:bg-stone-800 shadow-xl border border-gray-100 dark:border-stone-700 rounded-xl hidden flex-col overflow-hidden"></div>
                </div>

                <!-- Dark Mode Toggle -->
                <button onclick="toggleTheme()" class="text-xl p-2 hover:bg-gray-100 dark:hover:bg-stone-800 rounded-full transition ml-2 theme-toggle-icon">🌙</button>
            </div>
            
            <div class="md:hidden flex items-center gap-4">
                <button onclick="toggleTheme()" class="text-xl theme-toggle-icon">🌙</button>
                <button onclick="toggleMobileMenu()" class="text-2xl">☰</button>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white dark:bg-stone-900 border-b dark:border-stone-800 p-4 space-y-4 font-bold text-center">
            <a href="index.html" class="block w-full py-2">HOME</a>
            <a href="history.html" class="block w-full py-2">HISTORY</a>
            <a href="scenes.html" class="block w-full py-2">SCENES</a>
            <a href="memoirs.html" class="block w-full py-2">MEMOIRS</a>
            <a href="board.html" class="block w-full py-2">BOARD</a>
            <a href="memorial.html" class="block w-full py-2">MEMORIAL</a>
            <a href="goods.html" class="block w-full py-2">GOODS</a>
        </div>
    </nav>

    <!-- Page: HOME -->
    <section class="min-h-screen flex items-center justify-center hero-gradient text-white text-center fade-in" 
             style="background-image: url('assets/images/hero_background_1776300671538.png');">
        <div class="px-4 hero-content">
            <div class="mb-6 inline-block border-2 border-white px-4 py-1 tracking-widest text-sm font-bold uppercase">Legendary Racehorse</div>
            <h2 class="text-6xl md:text-8xl font-black mb-6 italic leading-tight">異次元の逃亡者</h2>
            <p class="text-xl md:text-2xl mb-12 opacity-90 max-w-2xl mx-auto font-light">
                「影さえ踏ませない」<br>
                そのスピードは、誰にも追いつけない場所へ。
            </p>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 max-w-5xl mx-auto mb-12">
                <a href="history.html" class="bg-white text-green-primary hover:bg-green-50 px-6 py-4 rounded-xl font-bold transition shadow-lg inline-block">競走履歴</a>
                <a href="scenes.html" class="bg-green-primary text-white hover:bg-green-hover px-6 py-4 rounded-xl font-bold transition shadow-lg inline-block">名場面</a>
                <a href="memorial.html" class="bg-white text-green-primary hover:bg-green-50 px-6 py-4 rounded-xl font-bold transition shadow-lg border border-green-100 inline-block">お墓・墓参</a>
                <a href="goods.html" class="bg-white/20 backdrop-blur-md text-white border border-white/30 hover:bg-white/30 px-6 py-4 rounded-xl font-bold transition inline-block">グッズ</a>
            </div>

            <!-- View Count Badge -->
            <div class="inline-flex items-center gap-3 bg-white/10 backdrop-blur-md border border-white/20 px-6 py-3 rounded-full text-sm font-bold tracking-wider">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="opacity-80">TOTAL LOVERS:</span>
                <span id="viewCount" class="text-lg font-black text-green-400">---</span>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white dark:bg-stone-950 border-t dark:border-stone-800 py-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-2xl font-black italic text-green-primary dark:text-green-400 mb-4">SILENT SUZUKA</p>
            <p class="text-xs text-gray-400 dark:text-gray-500">© 2024 Silent Suzuka Fan Site. This is a tribute page.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
</body>
</html>
